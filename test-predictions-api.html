<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Prédictions IA - Mokpokpo</title>
    <link rel="stylesheet" href="css/css_bootstrap/bootstrap.min.css">
    <style>
        body {
            background: #f8f9fa;
            padding: 2rem;
        }
        .test-section {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .test-result {
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">Test des Prédictions IA</h1>
        
        <div class="test-section">
            <h3>?? Test 1: Format JSON Structuré</h3>
            <button class="btn btn-primary" onclick="testJSONFormat()">Tester Format JSON</button>
            <div id="result1" class="test-result"></div>
        </div>
        
        <div class="test-section">
            <h3>?? Test 2: Format Texte Brut</h3>
            <button class="btn btn-primary" onclick="testTextFormat()">Tester Format Texte</button>
            <div id="result2" class="test-result"></div>
        </div>
        
        <div class="test-section">
            <h3>?? Test 3: API Réelle</h3>
            <div class="mb-3">
                <label class="form-label">Token JWT:</label>
                <input type="text" class="form-control" id="tokenInput" placeholder="Collez votre token ici">
            </div>
            <button class="btn btn-success" onclick="testRealAPI()">Tester API Réelle</button>
            <div id="result3" class="test-result"></div>
        </div>
        
        <div class="test-section">
            <h3>?? Test 4: Données Historiques</h3>
            <button class="btn btn-info" onclick="testHistoricalAPI()">Tester Historique</button>
            <div id="result4" class="test-result"></div>
        </div>
    </div>

    <script src="js/admin-dashboard.js"></script>
    <script>
        // Test 1: Format JSON
        function testJSONFormat() {
            const testData = {
                forecast_7_days: 125000,
                trends: "Tendance ą la hausse de 15% par rapport ą la semaine derničre. Les produits aromatiques sont en forte demande.",
                recommendations: [
                    "Augmenter le stock de basilic frais de 30%",
                    "Promouvoir les herbes médicinales en cette saison",
                    "Préparer une campagne marketing pour les superaliments"
                ],
                analysis_text: "L'analyse combinée du modčle ML RandomForest et de l'IA Gemini indique une croissance significative des ventes. Les facteurs saisonniers jouent un rōle important."
            };
            
            const result = renderSalesPredictions(testData);
            document.getElementById('result1').innerHTML = result;
            document.getElementById('result1').classList.add('border', 'border-success');
        }
        
        // Test 2: Format Texte
        function testTextFormat() {
            const testText = `
Prédiction de Ventes - 7 Prochains Jours

Prévision: 125,000 FCFA

Tendances: Augmentation de 15% par rapport ą la période précédente

Recommandations:
- Augmenter le stock de basilic frais
- Promouvoir les herbes médicinales
- Préparer une campagne marketing

Analyse:
Les données historiques montrent une forte croissance durant cette période de l'année.
Les produits aromatiques sont particuličrement demandés.
            `;
            
            const result = renderTextPrediction(testText);
            document.getElementById('result2').innerHTML = result;
            document.getElementById('result2').classList.add('border', 'border-success');
        }
        
        // Test 3: API Réelle
        async function testRealAPI() {
            const token = document.getElementById('tokenInput').value;
            const resultDiv = document.getElementById('result3');
            
            if (!token) {
                resultDiv.innerHTML = '<div class="alert alert-warning">Veuillez entrer un token JWT</div>';
                return;
            }
            
            resultDiv.innerHTML = '<div class="text-center"><div class="spinner-border"></div><p class="mt-2">Test en cours...</p></div>';
            
            try {
                const response = await fetch('https://bd-mokpokokpo.onrender.com/predictions/sales', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'accept': 'application/json'
                    }
                });
                
                const status = response.status;
                const contentType = response.headers.get('content-type');
                
                let data;
                if (contentType && contentType.includes('application/json')) {
                    data = await response.json();
                } else {
                    data = await response.text();
                }
                
                resultDiv.innerHTML = `
                    <div class="alert alert-${response.ok ? 'success' : 'danger'}">
                        <strong>Status:</strong> ${status} ${response.statusText}<br>
                        <strong>Content-Type:</strong> ${contentType}<br>
                        <strong>Type de données:</strong> ${typeof data}
                    </div>
                    <div class="card">
                        <div class="card-body">
                            <h6>Réponse brute:</h6>
                            <pre style="max-height: 300px; overflow: auto;">${typeof data === 'string' ? data : JSON.stringify(data, null, 2)}</pre>
                        </div>
                    </div>
                    ${response.ok ? `
                        <hr>
                        <h6>Rendu formaté:</h6>
                        ${renderSalesPredictions(data)}
                    ` : ''}
                `;
                resultDiv.classList.add('border', response.ok ? 'border-success' : 'border-danger');
            } catch (error) {
                resultDiv.innerHTML = `<div class="alert alert-danger"><strong>Erreur:</strong> ${error.message}</div>`;
                resultDiv.classList.add('border', 'border-danger');
            }
        }
        
        // Test 4: Historique
        async function testHistoricalAPI() {
            const token = document.getElementById('tokenInput').value;
            const resultDiv = document.getElementById('result4');
            
            if (!token) {
                resultDiv.innerHTML = '<div class="alert alert-warning">Veuillez entrer un token JWT dans le Test 3</div>';
                return;
            }
            
            resultDiv.innerHTML = '<div class="text-center"><div class="spinner-border"></div><p class="mt-2">Test en cours...</p></div>';
            
            try {
                const response = await fetch('https://bd-mokpokokpo.onrender.com/predictions/historical-data', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'accept': 'application/json'
                    }
                });
                
                const status = response.status;
                const contentType = response.headers.get('content-type');
                
                let data;
                if (contentType && contentType.includes('application/json')) {
                    data = await response.json();
                } else {
                    data = await response.text();
                }
                
                resultDiv.innerHTML = `
                    <div class="alert alert-${response.ok ? 'success' : 'danger'}">
                        <strong>Status:</strong> ${status} ${response.statusText}<br>
                        <strong>Content-Type:</strong> ${contentType}<br>
                        <strong>Type de données:</strong> ${typeof data}<br>
                        <strong>Nombre d'éléments:</strong> ${Array.isArray(data) ? data.length : 'N/A'}
                    </div>
                    <div class="card">
                        <div class="card-body">
                            <h6>Réponse brute:</h6>
                            <pre style="max-height: 300px; overflow: auto;">${typeof data === 'string' ? data : JSON.stringify(data, null, 2)}</pre>
                        </div>
                    </div>
                    ${response.ok ? `
                        <hr>
                        <h6>Rendu formaté:</h6>
                        ${renderHistoricalData(data)}
                    ` : ''}
                `;
                resultDiv.classList.add('border', response.ok ? 'border-success' : 'border-danger');
            } catch (error) {
                resultDiv.innerHTML = `<div class="alert alert-danger"><strong>Erreur:</strong> ${error.message}</div>`;
                resultDiv.classList.add('border', 'border-danger');
            }
        }
        
        // Auto-load token si disponible
        window.addEventListener('load', function() {
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            if (token) {
                document.getElementById('tokenInput').value = token;
            }
        });
    </script>
</body>
</html>
